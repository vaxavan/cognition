<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognition Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 4px; }
        .message-user { background: #2563eb; color: white; }
        .message-assistant { background: #2d2d2d; color: #e5e7eb; }
        .streaming-cursor::after {
            content: '▋';
            animation: blink 1s infinite;
            margin-left: 2px;
        }
        @keyframes blink { 50% { opacity: 0; } }
        pre {
            background: #1e1e1e !important;
            border-radius: 8px;
            padding: 12px;
            overflow-x: auto;
        }
        code { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-[#0f0f0f] text-gray-200 h-screen flex flex-col">
    <!-- Шапка с названием и кнопкой выхода -->
    <header class="border-b border-gray-800 px-4 py-3 flex items-center justify-between">
        <h1 class="text-xl font-semibold">🧠 Cognition Chat</h1>
        <div class="flex items-center gap-3">
            <span id="user-email" class="text-sm text-gray-400"></span>
            <button id="logout-btn" class="flex items-center gap-2 px-3 py-1.5 bg-gray-800 hover:bg-gray-700 rounded-lg transition text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Выйти
            </button>
        </div>
    </header>

    <main id="chat-messages" class="flex-1 overflow-y-auto px-4 md:px-6 lg:px-8 py-6">
        <div class="max-w-3xl mx-auto space-y-4"></div>
    </main>

    <footer class="border-t border-gray-800 p-4">
        <div class="max-w-3xl mx-auto flex gap-2">
            <textarea id="message-input" rows="1" placeholder="Введите сообщение..."
                class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 resize-none focus:outline-none focus:ring-2 focus:ring-blue-600"
                style="max-height: 150px; min-height: 48px;"></textarea>
            <button id="send-btn" class="bg-blue-600 hover:bg-blue-700 px-5 rounded-lg transition flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
